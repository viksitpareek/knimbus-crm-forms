<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closed Lost — Rejection Form</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            overflow: hidden;
        }

        .header {
            background: #1B2A4A;
            color: white;
            padding: 24px;
            text-align: center;
        }

        .body { padding: 30px; }

        .deal-box {
            background: #f8f9fb;
            border-left: 4px solid #dc3545;
            padding: 14px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:disabled {
            background: #aaa;
        }

        .alert {
            display: none;
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }

    </style>
</head>

<body>

<div class="card">

    <div class="header">
        <h2>❌ Reject Closed Lost</h2>
    </div>

    <div class="body">

        <div class="deal-box">
            <b>Deal:</b>
            <div id="dealNameDisplay">Loading...</div>
        </div>

        <textarea id="rejectionReason" placeholder="Enter rejection reason..."></textarea>

        <br><br>

        <button id="submitBtn" class="btn" onclick="submitRejection()">
            Submit Rejection
        </button>

        <div id="successMsg" class="alert success">
            ✅ Rejection submitted successfully
        </div>

        <div id="errorMsg" class="alert error">
            ❌ Something went wrong
        </div>

    </div>

</div>

<script>

    // Read URL params
    const params   = new URLSearchParams(window.location.search);
    const dealId   = params.get('dealId') || '';
    const dealName = decodeURIComponent(params.get('dealName') || 'Unknown Deal');

    document.getElementById('dealNameDisplay').innerText = dealName;

    // 🔗 YOUR FLOW WEBHOOK
    const WEBHOOK = "https://flow.zoho.in/60017418880/flow/webhook/incoming?zapikey=1001.beb7b7948ec6dbd7cbce79df03c43b2b.adb5bcc22859425c14c1abd2785311e4&isdebug=false";

    function submitRejection()
    {
        const reason = document.getElementById('rejectionReason').value.trim();

        if(!reason)
        {
            alert("Please enter reason");
            return;
        }

        if(!dealId)
        {
            alert("Deal ID missing");
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Submitting...";

        // ✅ FINAL WORKING REQUEST
        fetch(WEBHOOK, {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "dealId=" + encodeURIComponent(dealId) +
                  "&action=reject" +
                  "&reason=" + encodeURIComponent(reason)
        })
        .then(() => {
            document.getElementById('successMsg').style.display = 'block';
            btn.style.display = 'none';
        })
        .catch(() => {
            document.getElementById('errorMsg').style.display = 'block';
            btn.disabled = false;
            btn.innerText = "Submit Rejection";
        });
    }

</script>

</body>
</html>
