<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reject Closed Lost</title>

<style>
body {
    font-family: Arial;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 420px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
textarea {
    width: 100%;
    height: 120px;
    margin-top: 10px;
    padding: 10px;
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #dc3545;
    color: white;
    border: none;
    border-radius: 6px;
}
.success {
    display: none;
    margin-top: 15px;
    color: green;
}
</style>
</head>

<body>

<div class="card">
    <h2>❌ Reject Closed Lost</h2>

    <div><b>Deal:</b> <span id="dealNameDisplay"></span></div>

    <textarea id="reason" placeholder="Enter rejection reason"></textarea>

    <button id="btn" onclick="rejectDeal()">Submit</button>

    <div class="success" id="successMsg">✅ Rejected successfully</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const dealId = params.get('dealId') || '';
const dealName = decodeURIComponent(params.get('dealName') || 'Unknown Deal');

document.getElementById('dealNameDisplay').innerText = dealName;

const WEBHOOK = "https://flow.zoho.in/60017418880/flow/webhook/incoming?zapikey=1001.beb7b7948ec6dbd7cbce79df03c43b2b.adb5bcc22859425c14c1abd2785311e4";

function rejectDeal()
{
    const reason = document.getElementById('reason').value.trim();

    if(!reason)
    {
        alert("Enter reason");
        return;
    }

    const btn = document.getElementById("btn");
    btn.disabled = true;

    fetch(WEBHOOK, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "dealId=" + encodeURIComponent(dealId) +
              "&action=reject" +
              "&reason=" + encodeURIComponent(reason),
        mode: "no-cors"
    });

    setTimeout(() => {
        document.getElementById("successMsg").style.display = "block";
        btn.style.display = "none";
    }, 1200);
}
</script>

</body>
</html>
