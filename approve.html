<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approve Closed Lost</title>

<style>
    body {
        font-family: Arial;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 10px;
        text-align: center;
        width: 400px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h2 {
        margin-bottom: 10px;
    }

    .deal {
        font-weight: bold;
        margin-bottom: 20px;
        color: #1B2A4A;
    }

    button {
        background: #28a745;
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }

    button:disabled {
        background: #aaa;
        cursor: not-allowed;
    }

    /* Loader */
    .loader {
        display: none;
        margin-top: 20px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #28a745;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin-left: auto;
        margin-right: auto;
    }

    @keyframes spin {
        100% { transform: rotate(360deg); }
    }

    /* Success */
    .success {
        display: none;
        margin-top: 20px;
        color: green;
        font-weight: bold;
        animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
        from {opacity: 0;}
        to {opacity: 1;}
    }

</style>
</head>

<body>

<div class="card">
    <h2>✅ Approve Closed Lost</h2>

    <div class="deal" id="dealName">Loading...</div>

    <button id="approveBtn" onclick="approveDeal()">Confirm Approval</button>

    <div class="loader" id="loader"></div>

    <div class="success" id="successMsg">
        🎉 Approved successfully!<br><br>
        Deal marked as Closed Lost.
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const dealId = params.get('dealId') || '';
    const dealName = decodeURIComponent(params.get('dealName') || 'Unknown Deal');

    document.getElementById('dealName').textContent = dealName;

    const WEBHOOK = "https://flow.zoho.in/60017418880/flow/webhook/incoming?zapikey=1001.beb7b7948ec6dbd7cbce79df03c43b2b.adb5bcc22859425c14c1abd2785311e4";

    function approveDeal()
    {
        if(!dealId)
        {
            alert("Missing Deal ID");
            return;
        }

        const btn = document.getElementById("approveBtn");
        const loader = document.getElementById("loader");

        btn.disabled = true;
        loader.style.display = "block";

        const formData = new URLSearchParams();
        formData.append("dealId", dealId);
        formData.append("action", "approve");
        formData.append("reason", "Approved");

        fetch(WEBHOOK, {
            method: "POST",
            body: formData
        })
        .then(() => {
            loader.style.display = "none";
            document.getElementById("successMsg").style.display = "block";
            btn.style.display = "none";
        })
        .catch(() => {
            loader.style.display = "none";
            btn.disabled = false;
            alert("Something went wrong. Please try again.");
        });
    }
</script>

</body>
</html>
